services:
  db:
    image: postgres:16-alpine
    container_name: todo_pg
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    container_name: todo_redis
    ports:
      - '6379:6379'
    hostname: localhost